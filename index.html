<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM-4.7-Flash 对话</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            max-width:800px;
            margin:20px auto;
            padding:0 10px;
            font-family:system-ui, sans-serif;
            background: url("https://picsum.photos/1920/1080") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }
        h2{text-align:center;margin-bottom:20px;color:#fff; text-shadow: 0 0 4px #000;}
        #chat-box{
            height: 60vh;
            border:1px solid #e5e7eb;
            border-radius:10px;
            padding:15px;
            overflow-y:auto;
            margin-bottom:15px;
            background: rgba(255,255,255,0.85);
        }
        .msg{margin:10px 0;padding:12px;border-radius:8px;max-width:85%;line-height:1.5;}
        .user{background:#1677ff;color:#fff;margin-left:auto;}
        .ai{background:#ffffff;border:1px solid #eee;margin-right:auto;}
        .loading{color:#666;font-style:italic;}
        .msg-img {
            max-width: 200px;
            border-radius: 6px;
            margin-top: 8px;
            display: block;
        }
        .input-area{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        #input{flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;outline:none;font-size:14px;background:rgba(255,255,255,0.9);min-width: 200px;}
        #send{padding:12px 20px;border:none;background:#1677ff;color:#fff;border-radius:8px;cursor:pointer;font-size:14px;}
        #send:disabled{background:#88a8e8;cursor:not-allowed;}
        .upload-btn {
            padding: 12px 16px;
            background: #6c757d;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        #file-input {display: none;}
        #preview-box {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 8px;
            display: none;
        }
        #preview-img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 6px;
        }
        .remove-img {color: red;cursor: pointer;margin-left: 10px;}
    </style>
</head>
<body>
    <h2>GLM-4.7-Flash 图文对话</h2>
    <div id="chat-box"></div>

    <div id="preview-box">
        < img id="preview-img" alt="预览图">
        <span class="remove-img" onclick="clearImage()">移除图片</span>
    </div>

    <div class="input-area">
        <label class="upload-btn" for="file-input">选择图片</label>
        <input type="file" id="file-input" accept="image/*">
        <input type="text" id="input" placeholder="输入文字，可搭配图片一起发送">
        <button id="send">发送</button>
    </div>

    <script>
        const API_URL = "/api/chat";
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const fileInput = document.getElementById('file-input');
        const previewBox = document.getElementById('preview-box');
        const previewImg = document.getElementById('preview-img');

        let currentImgBase64 = "";
        let isRequesting = false; // 标记是否正在请求

        function addMsg(text, imgSrc, isUser){
            if (!chatBox) return;
            const div = document.createElement('div');
            div.className = isUser ? 'msg user' : 'msg ai';
            if(text) div.innerText = text;
            if(imgSrc){
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = "msg-img";
                div.appendChild(img);
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function clearImage(){
            currentImgBase64 = "";
            if (previewBox) previewBox.style.display = "none";
            if (previewImg) previewImg.src = "";
            if (fileInput) fileInput.value = "";
        }

        if (fileInput) {
            fileInput.addEventListener('change', function(e){
                const file = e.target.files[0];
                if(!file) return;
                if(file.size > 5 * 1024 * 1024){
                    alert("图片不能超过5MB！");
                    fileInput.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(ev){
                    currentImgBase64 = ev.target.result;
                    if (previewImg) previewImg.src = currentImgBase64;
                    if (previewBox) previewBox.style.display = "block";
                };
                reader.readAsDataURL(file);
            });
        }

        async function chat(text){
            // 关键：请求中直接拦截新请求
            if (isRequesting) {
                alert("请等待上一条请求完成后再发送！");
                return;
            }
            isRequesting = true;
            if (sendBtn) sendBtn.disabled = true;

            const imgBase64 = currentImgBase64;
            addMsg(text, imgBase64, true);
            if (input) input.value = "";
            clearImage();

            const loadingMsg = addMsg("正在生成回复...", "", false);

            try {
                let messages = [];
                if(imgBase64){
                    messages.push({
                        role: "user",
                        content: [
                            { type: "text", text: text || "请描述这张图片" },
                            { 
                                type: "image_url", 
                                image_url: { 
                                    url: imgBase64,
                                    detail: "auto"
                                } 
                            }
                        ]
                    });
                } else {
                    messages.push({ role: "user", content: text });
                }

                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json; charset=utf-8"
                    },
                    body: JSON.stringify({ messages: messages })
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    console.error("后端返回错误详情：", errorData);
                    throw new Error(`接口错误: ${res.status} - ${errorData.error || errorData.tip || ""}`);
                }

                const data = await res.json();
                const reply = data.choices?.[0]?.message?.content || "AI没有返回有效回复";
                if (loadingMsg) chatBox.removeChild(loadingMsg);
                addMsg(reply, "", false);
            } catch (err) {
                if (loadingMsg) chatBox.removeChild(loadingMsg);
                addMsg(`请求失败：${err.message}`, "", false);
                console.error("请求错误:", err);
            } finally {
                isRequesting = false;
                if (sendBtn) sendBtn.disabled = false;
            }
        }

        if (sendBtn) {
            sendBtn.addEventListener('click', ()=>{
                const txt = input?.value?.trim() || "";
                if(!txt && !currentImgBase64) return;
                chat(txt);
            });
        }

        if (input) {
            input.addEventListener('keydown', (e)=>{
                if(e.key === 'Enter'){
                    const txt = input?.value?.trim() || "";
                    if(!txt && !currentImgBase64) return;
                    chat(txt);
                }
            });
        }
    </script>
</body>
</html>
