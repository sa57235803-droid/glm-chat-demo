<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM-4.7-Flash 对话</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            max-width:800px;
            margin:20px auto;
            padding:0 10px;
            font-family:system-ui, sans-serif;
            /* 背景图配置，自行替换链接 */
            background: url("VRChat_2026-02-17_00-59-44.043_1920x1080.png") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }
        h2{text-align:center;margin-bottom:20px;color:#fff; text-shadow: 0 0 4px #000;}
        #chat-box{
            height: 60vh;
            border:1px solid #e5e7eb;
            border-radius:10px;
            padding:15px;
            overflow-y:auto;
            margin-bottom:15px;
            background: rgba(255,255,255,0.85);
        }
        .msg{margin:10px 0;padding:12px;border-radius:8px;max-width:85%;line-height:1.5;}
        .user{background:#1677ff;color:#fff;margin-left:auto;}
        .ai{background:#ffffff;border:1px solid #eee;margin-right:auto;}
        /* 消息内图片样式 */
        .msg-img {
            max-width: 200px;
            border-radius: 6px;
            margin-top: 8px;
            display: block;
        }
        /* 输入区域整体 */
        .input-area{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        #input{flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;outline:none;font-size:14px;background:rgba(255,255,255,0.9);min-width: 200px;}
        #send{padding:12px 20px;border:none;background:#1677ff;color:#fff;border-radius:8px;cursor:pointer;font-size:14px;}
        #send:disabled{background:#88a8e8;cursor:not-allowed;}
        /* 图片上传按钮 */
        .upload-btn {
            padding: 12px 16px;
            background: #6c757d;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        /* 隐藏原生文件选择框 */
        #file-input {
            display: none;
        }
        /* 图片预览区域 */
        #preview-box {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 8px;
            display: none;
        }
        #preview-img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 6px;
        }
        .remove-img {
            color: red;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h2>GLM-4.7-Flash 图文对话</h2>
    <div id="chat-box"></div>

    <!-- 图片预览区 -->
    <div id="preview-box">
        < img id="preview-img" alt="预览图">
        <span class="remove-img" onclick="clearImage()">移除图片</span>
    </div>

    <!-- 输入+上传+发送区域 -->
    <div class="input-area">
        <label class="upload-btn" for="file-input">选择图片</label>
        <input type="file" id="file-input" accept="image/*">
        <input type="text" id="input" placeholder="输入文字，可搭配图片一起发送">
        <button id="send">发送</button>
    </div>

    <script>
        const API_URL = "/api/chat";
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const fileInput = document.getElementById('file-input');
        const previewBox = document.getElementById('preview-box');
        const previewImg = document.getElementById('preview-img');

        // 存储当前选中图片的Base64
        let currentImgBase64 = "";

        // 追加消息（支持文字+图片）
        function addMsg(text, imgSrc, isUser){
            const div = document.createElement('div');
            div.className = isUser ? 'msg user' : 'msg ai';
            // 文字内容
            if(text) div.innerText = text;
            // 图片内容
            if(imgSrc){
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = "msg-img";
                div.appendChild(img);
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 清空已选图片
        function clearImage(){
            currentImgBase64 = "";
            previewBox.style.display = "none";
            previewImg.src = "";
        }

        // 监听图片选择
        fileInput.addEventListener('change', function(e){
            const file = e.target.files[0];
            if(!file) return;
            // 限制图片大小：5MB
            if(file.size > 5 * 1024 * 1024){
                alert("图片不能超过5MB！");
                fileInput.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(ev){
                currentImgBase64 = ev.target.result;
                // 显示预览
                previewImg.src = currentImgBase64;
                previewBox.style.display = "block";
            };
            reader.readAsDataURL(file);
        });

        // 发送请求（兼容纯文字 / 图文）
        async function chat(text){
            sendBtn.disabled = true;
            const imgBase64 = currentImgBase64;

            // 前端展示消息
            addMsg(text, imgBase64, true);
            input.value = "";
            clearImage();

            try {
                // 组装智谱多模态消息体
                let messages = [];
                if(imgBase64){
                    // 图文格式
                    messages.push({
                        role: "user",
                        content: [
                            { type: "text", text: text || "请描述这张图片" },
                            { type: "image_url", image_url: { url: imgBase64 } }
                        ]
                    });
                } else {
                    // 纯文字格式
                    messages.push({ role: "user", content: text });
                }

                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages })
                });

                const data = await res.json();
                const reply = data.choices[0].message.content;
                addMsg(reply, "", false);
            } catch (err) {
                addMsg("请求失败，请稍后重试", "", false);
                console.error(err);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 点击发送
        sendBtn.addEventListener('click', ()=>{
            const txt = input.value.trim();
            // 文字/图片 至少有一个才能发送
            if(!txt && !currentImgBase64) return;
            chat(txt);
        });

        // 回车发送
        input.addEventListener('keydown', (e)=>{
            if(e.key === 'Enter'){
                const txt = input.value.trim();
                if(!txt && !currentImgBase64) return;
                chat(txt);
            }
        });
    </script>
</body>
</html>
