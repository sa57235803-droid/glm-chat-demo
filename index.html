<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM-4.7-Flash еҜ№иҜқ</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            max-width:800px;
            margin:20px auto;
            padding:0 10px;
            font-family:system-ui, sans-serif;
            /* иғҢжҷҜеӣҫй…ҚзҪ®пјҢиҮӘиЎҢжӣҝжҚўй“ҫжҺҘ */
            background: url("https://picsum.photos/1920/1080") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }
        h2{text-align:center;margin-bottom:20px;color:#fff; text-shadow: 0 0 4px #000;}
        #chat-box{
            height: 60vh;
            border:1px solid #e5e7eb;
            border-radius:10px;
            padding:15px;
            overflow-y:auto;
            margin-bottom:15px;
            background: rgba(255,255,255,0.85);
        }
        .msg{margin:10px 0;padding:12px;border-radius:8px;max-width:85%;line-height:1.5;}
        .user{background:#1677ff;color:#fff;margin-left:auto;}
        .ai{background:#ffffff;border:1px solid #eee;margin-right:auto;}
        /* ж¶ҲжҒҜеҶ…еӣҫзүҮж ·ејҸ */
        .msg-img {
            max-width: 200px;
            border-radius: 6px;
            margin-top: 8px;
            display: block;
        }
        /* иҫ“е…ҘеҢәеҹҹж•ҙдҪ“ */
        .input-area{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        #input{flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;outline:none;font-size:14px;background:rgba(255,255,255,0.9);min-width: 200px;}
        #send{padding:12px 20px;border:none;background:#1677ff;color:#fff;border-radius:8px;cursor:pointer;font-size:14px;}
        #send:disabled{background:#88a8e8;cursor:not-allowed;}
        /* еӣҫзүҮдёҠдј жҢүй’® */
        .upload-btn {
            padding: 12px 16px;
            background: #6c757d;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        /* йҡҗи—ҸеҺҹз”ҹж–Үд»¶йҖүжӢ©жЎҶ */
        #file-input {
            display: none;
        }
        /* еӣҫзүҮйў„и§ҲеҢәеҹҹ */
        #preview-box {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 8px;
            display: none;
        }
        #preview-img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 6px;
        }
        .remove-img {
            color: red;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h2>GLM-4.7-Flash еӣҫж–ҮеҜ№иҜқ</h2>
    <div id="chat-box"></div>

    <!-- еӣҫзүҮйў„и§ҲеҢә -->
    <div id="preview-box">
        < img id="preview-img" alt="йў„и§Ҳеӣҫ">
        <span class="remove-img" onclick="clearImage()">з§»йҷӨеӣҫзүҮ</span>
    </div>

    <!-- иҫ“е…Ҙ+дёҠдј +еҸ‘йҖҒеҢәеҹҹ -->
    <div class="input-area">
        <label class="upload-btn" for="file-input">йҖүжӢ©еӣҫзүҮ</label>
        <input type="file" id="file-input" accept="image/*">
        <input type="text" id="input" placeholder="иҫ“е…Ҙж–Үеӯ—пјҢеҸҜжҗӯй…ҚеӣҫзүҮдёҖиө·еҸ‘йҖҒ">
        <button id="send">еҸ‘йҖҒ</button>
    </div>

    <script>
        const API_URL = "/api/chat";
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const fileInput = document.getElementById('file-input');
        const previewBox = document.getElementById('preview-box');
        const previewImg = document.getElementById('preview-img');

        // еӯҳеӮЁеҪ“еүҚйҖүдёӯеӣҫзүҮзҡ„Base64
        let currentImgBase64 = "";

        // иҝҪеҠ ж¶ҲжҒҜпјҲж”ҜжҢҒж–Үеӯ—+еӣҫзүҮпјү
        function addMsg(text, imgSrc, isUser){
            if (!chatBox) return;
            const div = document.createElement('div');
            div.className = isUser ? 'msg user' : 'msg ai';
            // ж–Үеӯ—еҶ…е®№
            if(text) div.innerText = text;
            // еӣҫзүҮеҶ…е®№
            if(imgSrc){
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = "msg-img";
                div.appendChild(img);
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // жё…з©әе·ІйҖүеӣҫзүҮ
        function clearImage(){
            currentImgBase64 = "";
            if (previewBox) previewBox.style.display = "none";
            if (previewImg) previewImg.src = "";
            if (fileInput) fileInput.value = "";
        }

        // зӣ‘еҗ¬еӣҫзүҮйҖүжӢ©
        if (fileInput) {
            fileInput.addEventListener('change', function(e){
                const file = e.target.files[0];
                if(!file) return;
                // йҷҗеҲ¶еӣҫзүҮеӨ§е°Ҹпјҡ5MB
                if(file.size > 5 * 1024 * 1024){
                    alert("еӣҫзүҮдёҚиғҪи¶…иҝҮ5MBпјҒ");
                    fileInput.value = "";
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(ev){
                    currentImgBase64 = ev.target.result;
                    // жҳҫзӨәйў„и§Ҳ
                    if (previewImg) previewImg.src = currentImgBase64;
                    if (previewBox) previewBox.style.display = "block";
                };
                reader.readAsDataURL(file);
            });
        }

        // еҸ‘йҖҒиҜ·жұӮпјҲе…је®№зәҜж–Үеӯ— / еӣҫж–Үпјү
        async function chat(text){
            if (!sendBtn) return;
            sendBtn.disabled = true;
            const imgBase64 = currentImgBase64;

            // еүҚз«Ҝеұ•зӨәж¶ҲжҒҜ
            addMsg(text, imgBase64, true);
            if (input) input.value = "";
            clearImage();

            try {
                // гҖҗе…ій”®дҝ®еӨҚ1гҖ‘дёҘж јжҢүз…§жҷәи°ұи§„иҢғз»„иЈ…messagesж•°з»„
                let messages = [];
                if(imgBase64){
                    // еӨҡжЁЎжҖҒеӣҫж–Үж јејҸпјҲе®Ңе…Ёз¬ҰеҗҲжҷәи°ұAPIиҰҒжұӮпјү
                    messages.push({
                        role: "user",
                        content: [
                            { type: "text", text: text || "иҜ·жҸҸиҝ°иҝҷеј еӣҫзүҮ" },
                            { 
                                type: "image_url", 
                                image_url: { 
                                    url: imgBase64, // е®Ңж•ҙBase64пјҢеҢ…еҗ«data:image/...еүҚзјҖ
                                    detail: "auto"
                                } 
                            }
                        ]
                    });
                } else {
                    // зәҜж–Үеӯ—ж јејҸ
                    messages.push({ role: "user", content: text });
                }

                // гҖҗе…ій”®дҝ®еӨҚ2гҖ‘ејәеҲ¶еЈ°жҳҺContent-Typeдёәapplication/json
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json; charset=utf-8"
                    },
                    body: JSON.stringify({ messages: messages })
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    console.error("еҗҺз«Ҝиҝ”еӣһй”ҷиҜҜиҜҰжғ…пјҡ", errorData);
                    throw new Error(`жҺҘеҸЈй”ҷиҜҜ: ${res.status} - ${errorData.error || errorData.tip || ""}`);
                }

                const data = await res.json();
                const reply = data.choices?.[0]?.message?.content || "AIжІЎжңүиҝ”еӣһжңүж•ҲеӣһеӨҚ";
                addMsg(reply, "", false);
            } catch (err) {
                addMsg("иҜ·жұӮеӨұиҙҘпјҢиҜ·зЁҚеҗҺйҮҚиҜ•", "", false);
                console.error("иҜ·жұӮй”ҷиҜҜ:", err);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // зӮ№еҮ»еҸ‘йҖҒ
        if (sendBtn) {
            sendBtn.addEventListener('click', ()=>{
                const txt = input?.value?.trim() || "";
                // ж–Үеӯ—/еӣҫзүҮ иҮіе°‘жңүдёҖдёӘжүҚиғҪеҸ‘йҖҒ
                if(!txt && !currentImgBase64) return;
                chat(txt);
            });
        }

        // еӣһиҪҰеҸ‘йҖҒ
        if (input) {
            input.addEventListener('keydown', (e)=>{
                if(e.key === 'Enter'){
                    const txt = input?.value?.trim() || "";
                    if(!txt && !currentImgBase64) return;
                    chat(txt);
                }
            });
        }
    </script>
</body>
</html>
