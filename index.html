<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 在线对话</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            max-width:800px;
            margin:20px auto;
            padding:0 10px;
            font-family:system-ui, sans-serif;
            background: url("VRChat_2026-02-17_00-59-44.043_1920x1080.png") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }
        h2{color:#fff; text-shadow: 0 0 4px #000;}
        .clear-btn{
            padding:8px 16px;
            background:#dc3545;
            color:#fff;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:14px;
        }
        #chat-box{
            height: 65vh;
            border:1px solid #e5e7eb;
            border-radius:10px;
            padding:15px;
            overflow-y:auto;
            margin-bottom:15px;
            background: rgba(255,255,255,0.85);
        }
        .msg{margin:10px 0;padding:12px;border-radius:8px;max-width:85%;line-height:1.5;white-space:pre-wrap;}
        .user{background:#1677ff;color:#fff;margin-left:auto;}
        .ai{background:#ffffff;border:1px solid #eee;margin-right:auto;}
        .loading{color:#666;font-style:italic;}
        .input-area{display:flex;gap:10px;align-items:center;}
        #input{flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;outline:none;font-size:14px;background:rgba(255,255,255,0.9);}
        #send{padding:12px 24px;border:none;background:#1677ff;color:#fff;border-radius:8px;cursor:pointer;font-size:14px;}
        #send:disabled{background:#88a8e8;cursor:not-allowed;}
    </style>
</head>
<body>
    <div class="header">
        <h2>AI 在线对话</h2>
        <button class="clear-btn" onclick="clearHistory()">清空历史记录</button>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="输入问题，回车发送">
        <button id="send">发送</button>
    </div>

    <script>
        const API_URL = "/api/chat";
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        // 历史记录数组，格式：[{role: "user", content: "xxx"}, {role: "assistant", content: "xxx"}]
        let chatHistory = [];
        let isRequesting = false;

        // 页面加载时读取历史记录
        window.addEventListener('load', () => {
            const savedHistory = localStorage.getItem('chatHistory');
            if (savedHistory) {
                chatHistory = JSON.parse(savedHistory);
                renderHistory();
            }
        });

        // 渲染历史记录
        function renderHistory() {
            chatBox.innerHTML = "";
            chatHistory.forEach(msg => {
                addMsg(msg.content, msg.role === "user");
            });
        }

        // 保存历史记录到本地
        function saveHistory() {
            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
        }

        // 清空历史记录
        function clearHistory() {
            if (confirm("确定要清空所有聊天记录吗？此操作不可恢复")) {
                chatHistory = [];
                localStorage.removeItem('chatHistory');
                chatBox.innerHTML = "";
            }
        }

        // 添加单条消息到界面
        function addMsg(text, isUser){
            if (!chatBox) return;
            const div = document.createElement('div');
            div.className = isUser ? 'msg user' : 'msg ai';
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        // 发送对话请求
        async function chat(text){
            if (isRequesting) {
                addMsg("⚠️ 正在处理上一条请求，请稍后再发", false);
                return;
            }
            isRequesting = true;
            sendBtn.disabled = true;

            // 添加用户消息到历史和界面
            const userMsg = { role: "user", content: text };
            chatHistory.push(userMsg);
            addMsg(text, true);
            input.value = "";

            const loadingMsg = addMsg("正在生成回复...", false);

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json; charset=utf-8"
                    },
                    body: JSON.stringify({ 
                        messages: chatHistory // 发送完整历史记录，实现上下文对话
                    })
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    console.error("后端返回错误详情：", errorData);
                    throw new Error(`接口错误: ${res.status} - ${errorData.message || errorData.tip || ""}`);
                }

                const data = await res.json();
                const reply = data.choices?.[0]?.message?.content || "AI没有返回有效回复";
                
                // 移除加载消息，添加AI回复到历史和界面
                chatBox.removeChild(loadingMsg);
                const aiMsg = { role: "assistant", content: reply };
                chatHistory.push(aiMsg);
                addMsg(reply, false);

                // 保存历史记录
                saveHistory();

            } catch (err) {
                if (loadingMsg) chatBox.removeChild(loadingMsg);
                addMsg(`请求失败：${err.message}`, false);
                console.error("请求错误:", err);
                // 出错时回滚用户消息
                chatHistory.pop();
            } finally {
                isRequesting = false;
                sendBtn.disabled = false;
            }
        }

        // 点击发送
        sendBtn.addEventListener('click', ()=>{
            const txt = input.value.trim();
            if(!txt) return;
            chat(txt);
        });

        // 回车发送
        input.addEventListener('keydown', (e)=>{
            if(e.key === 'Enter'){
                const txt = input.value.trim();
                if(!txt) return;
                chat(txt);
            }
        });
    </script>
</body>
</html>
